<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <mask id="hole">
                <rect 
                    x="0" 
                    y="0"   
                    width="100" 
                    height="100"
                    fill="white"
                />
                <rect 
                    x="6.5"
                    y="6.5"
                    width="87" 
                    height="87" 
                    fill="black" 
                    rx="10"
                />
        </mask>

        <clipPath id="rectClip">
            <rect 
                x="6.5" 
                y="6.5" 
                width="87" 
                height="87"
                fill="none"
                stroke="black"  
                rx="10"
                stroke-width="5"
            />
        </clipPath>        
    </defs>

    <rect 
        x="0" 
        y="0" 
        width="100" 
        height="100" 
        fill="rgba(255, 255, 255, 0.65)"  
        mask="url(#hole)"
        stroke="white"
        stroke-width="4"
    />
    
    <rect 
        x="6.5" 
        y="6.5" 
        width="87" 
        height="87"
        fill="#ffffff0d"
        stroke="white"  
        rx="10"
        stroke-width="5"
        clip-path="url(#rectClip)"
    />

    <rect 
        x="12.5" 
        y="12.5" 
        width="75" 
        height="75"
        rx="10" 
        stroke="white"
        stroke-width="1"
        fill="rgba(255, 255, 255, 0.65)"  
    />
</svg>