<svg xmlns="http://www.w3.org/2000/svg" viewBox="15 15 60 60" preserveAspectRatio="none">
   <defs>
    <linearGradient id="grad" x1="120%" y1="0%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="hsl(0, 0%, 65%)"/>
            <stop offset="50%" stop-color="hsl(0, 0%, 95%)"/>
            <stop offset="80%" stop-color="hsl(0, 0%, 75%)"/>
            <stop offset="100%" stop-color="hsl(0, 0%, 100%)"/>
    </linearGradient>

    <filter id="metalic">
        <feTurbulence
            type="fractalNoise"
            baseFrequency="10 0"
            numOctaves="2"
            result="turb"
        />
        <feOffset 
            in="turb"
            dx="0"
            dy="0"
            result="movedTurb"
        />
        <feDisplacementMap 
            in="SourceGraphic" 
            in2="movedTurb" 
            scale="50"
            xChannelSelector="R"
            yChannelSelector="G"
        />
    </filter>
    </defs>
   <rect
       x="0"
       y="0"
       width="100"
       height="100"
       fill="url(#grad)"
       filter="url(#metalic)"
       opacity="1"
       transform="rotate(180, 50, 50)"
   />
</svg>
