<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
   <defs>
    <filter id="metalic">
        <feTurbulence type="fractalNoise" baseFrequency="1 2" numOctaves="4" result="noise"/>
        <feSpecularLighting 
            in="noise" 
            surfaceScale="6" 
            specularConstant="0.8" 
            specularExponent="50" 
            lighting-color="#00ff1e" 
            result="spec"
        >
            <fePointLight x="0" y="0" z="100"/>
        </feSpecularLighting>
    </filter>

   </defs>
   <rect x="0" y="0" width="100" height="100" fill="none" stroke-width="1.5" stroke="#00ff1e50" />
   <rect x="10" y="10" width="90" height="90"  filter="url(#metalic)" />
</svg>
